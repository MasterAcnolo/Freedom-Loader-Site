<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Store the requested path in sessionStorage
      const path = window.location.pathname.replace('/Freedom-Loader-Site', '');
      if (path !== '/') {
        sessionStorage.setItem('redirect', path);
      }
      // Redirect to index.html
      window.location.replace('/Freedom-Loader-Site/');
    </script>
  </head>
  <body>
  </body>
</html>
