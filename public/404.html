<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <!-- This page redirects to index.html with the requested path -->
    <title>Redirecting...</title>
    <script>
      // Get the current path and redirect
      const path = window.location.pathname + window.location.search + window.location.hash;
      // Remove the base path and redirect to index.html with the original path
      if (path !== '/Freedom-Loader-Site/') {
        window.location.replace('/Freedom-Loader-Site/#' + path.replace('/Freedom-Loader-Site', ''));
      }
    </script>
  </head>
  <body>
  </body>
</html>
